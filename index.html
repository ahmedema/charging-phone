<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>محطة الشحن - Phone Charging Management</title>
    <link id="app-manifest" rel="manifest" href="/manifest-charging.json" />
    <script>
      (function() {
        if (window.location.pathname.startsWith('/laundry')) {
          var link = document.getElementById('app-manifest');
          if (link) link.href = '/manifest-laundry.json';
          document.title = 'المغسلة - Laundry Management';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
